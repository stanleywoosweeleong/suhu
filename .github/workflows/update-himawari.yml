name: Mirror Himawari

# Fetches the latest Himawari frame on GitHub's servers — never on your computer.
on:
  schedule:
    - cron: '*/30 * * * *'   # every 30 min. Use '*/10 * * * *' for 10-min cadence.
  workflow_dispatch: {}

permissions:
  contents: write

# One mirror run at a time.
concurrency:
  group: himawari-mirror
  cancel-in-progress: false

jobs:
  mirror:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Fetch latest Himawari frame
        run: node mirror-himawari.js

      - name: Commit mirrored image
        run: |
          git config user.name  "suhu-bot"
          git config user.email "suhu-bot@users.noreply.github.com"
          git add -A himawari/
          git commit -m "chore: himawari mirror $(date -u +%FT%TZ)" || { echo "no changes"; exit 0; }
          # Retry against concurrent pushes from the other workflows.
          for i in 1 2 3 4 5; do
            git pull --rebase --autostash origin main && git push && { echo "pushed"; exit 0; }
            echo "push race — retry $i"; sleep $((RANDOM % 8 + 3))
          done
          echo "push failed after 5 retries"; exit 1
