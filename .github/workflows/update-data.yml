name: Update SUHU data

# Runs on GitHub's servers — never on your computer.
on:
  schedule:
    - cron: '0 */6 * * *'   # every 6 hours (UTC). Adjust as needed.
  workflow_dispatch: {}       # lets you trigger it manually from the Actions tab

permissions:
  contents: write             # allows the job to commit the refreshed data.json

# Only one refresh at a time — prevents two runs racing to push.
concurrency:
  group: suhu-data
  cancel-in-progress: false

jobs:
  refresh:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Fetch & parse climate feeds
        run: node fetch-data.js

      - name: Commit updated data.json
        run: |
          git config user.name  "suhu-bot"
          git config user.email "suhu-bot@users.noreply.github.com"
          git add data.json
          git commit -m "chore: refresh climate data $(date -u +%FT%TZ)" || { echo "no changes"; exit 0; }
          # Retry against concurrent pushes from the other workflows.
          for i in 1 2 3 4 5; do
            git pull --rebase --autostash origin main && git push && { echo "pushed"; exit 0; }
            echo "push race — retry $i"; sleep $((RANDOM % 8 + 3))
          done
          echo "push failed after 5 retries"; exit 1
